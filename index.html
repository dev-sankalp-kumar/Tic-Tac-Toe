<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>My Tic Tac Toe Game</h1>
    <div class="turn"></div>
    <div class="container">
        <div class="grid">
            <div class="row">
                <div  onclick="handleClick(this)" id="0" class="col bt-0 bl-0"></div>
                <div  onclick="handleClick(this)" id="1" class="col bt-0"></div>
                <div  onclick="handleClick(this)" id="2" class="col bt-0 br-0"></div>
            </div>
            <div class="row">
                <div  onclick="handleClick(this)" id="3" class="col bl-0"></div>
                <div  onclick="handleClick(this)" id="4" class="col"></div>
                <div  onclick="handleClick(this)" id="5" class="col br-0"></div>
            </div>
            <div class="row">
                <div  onclick="handleClick(this)" id="6" class="col bb-0 bl-0"></div>
                <div  onclick="handleClick(this)" id="7" class="col bb-0"></div>
                <div  onclick="handleClick(this)" id="8" class="col bb-0 br-0"></div>
            </div>
        </div>

    </div>
    <img class="img" src="assets/imgs/excited.gif" alt="">
    <div class="msg"></div>

    <script src="script.js"></script>
</body>

</html>
